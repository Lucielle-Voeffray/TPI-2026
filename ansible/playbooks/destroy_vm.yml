# Version     : 0.1.0
# Description : Playbook pour détruire les VMs correspondant aux
#               tags définis dans la configuration enseignant
#
# -------------------------------------------------------------------

---
- name: Détruire les VMs correspondant à la configuration enseignant
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml
    - ../config/enseignant.yml

  vars:
    vm_required_tags:
      - "{{ vmconf_module | lower }}"
      - "{{ vmconf_class | lower }}"
      - "{{ vmconf_teacher_username | lower }}"

  tasks:
    - name: Récupérer les machines virtuelles présentes dans le cluster
      community.proxmox.proxmox_vm_info:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_validate_certs }}"

        type: qemu
        config: current
      register: proxmox_vm_information

    - name: Initialiser la liste des VMs à détruire
      ansible.builtin.set_fact:
        vms_to_destroy: []

    - name: Sélectionner les VMs correspondant aux tags demandés
      ansible.builtin.set_fact:
        vms_to_destroy: "{{ vms_to_destroy + [item] }}"
      loop: "{{ proxmox_vm_information.proxmox_vms }}"
      loop_control:
        label: "{{ item.name | default(item.vmid) }}"
      vars:
        current_vm_tags: >-
          {{
            (item.tags | default('') | string).split(';')
            | map('lower')
            | list
          }}
      when:
        - not (item.template | default(false) | bool)
        - vm_required_tags | difference(current_vm_tags) | length == 0

    - name: Afficher les tags recherchés
      ansible.builtin.debug:
        msg: "Tags recherchés : {{ vm_required_tags | join(', ') }}"

    - name: Afficher les VMs qui seront détruites
      ansible.builtin.debug:
        msg: "VM sélectionnée : {{ item.name }} - VMID {{ item.vmid }} - Nœud {{ item.node }}"
      loop: "{{ vms_to_destroy }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Arrêter le playbook lorsqu'aucune VM ne correspond aux tags
      ansible.builtin.meta: end_play
      when: vms_to_destroy | length == 0

    - name: Vérifier que la destruction a été explicitement confirmée
      ansible.builtin.assert:
        that:
          - destroy_confirm | default(false) | bool
        fail_msg: >-
          Les VMs ont été trouvées, mais aucune destruction n'a été effectuée.
          Relancer avec -e destroy_confirm=true pour confirmer la suppression.

    - name: Détruire chaque VM sélectionnée
      ansible.builtin.include_tasks: tasks/tasks_destroy_vm.yml
      loop: "{{ vms_to_destroy }}"
      loop_control:
        loop_var: vm_to_destroy
        label: "{{ vm_to_destroy.name }} ({{ vm_to_destroy.vmid }})"
